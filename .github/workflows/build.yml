name: Swift Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16'

    - name: Show Toolchain
      run: |
        xcodebuild -version
        swift --version

    - name: Resolve Dependencies
      run: swift package resolve

    - name: Build
      run: swift build -v

    - name: Run Tests
      run: swift test -v

