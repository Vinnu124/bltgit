name: Swift Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.2.app # Ensures a stable macOS SDK for compilation

    - name: Resolve Dependencies
      run: swift package resolve

    - name: Build
      run: swift build -v

